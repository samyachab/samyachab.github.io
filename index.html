    <style>
        /* On retire les marges de base de la page */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5; /* Couleur de fond (gris très clair) */
            display: flex;
            flex-direction: column;
            align-items: center; /* Centre le contenu */
        }
        
        /* Conteneur pour limiter la largeur sur les très grands écrans (comme Adobe Portfolio) */
        .portfolio-container {
            width: 100%;
            max-width: 1400px; /* Tu peux modifier cette valeur selon la largeur de tes frames Figma */
            display: flex;
            flex-direction: column;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1); /* Petite ombre légère autour de la présentation */
        }

        /* Réglages pour que les images s'enchaînent sans aucun espace blanc */
        .portfolio-container img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
